name: Build Wii DOL

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    container: devkitpro/devkitppc:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: make
      - name: Upload boot.dol
        uses: actions/upload-artifact@v4
        with:
          name: boot-dol
          path: boot.dol