<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wii Boot DOL Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 600px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .title {
            font-size: 36px;
            color: #667eea;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .subtitle {
            font-size: 16px;
            color: #999;
            margin-bottom: 40px;
        }

        .step {
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .step:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .step-title {
            font-size: 14px;
            color: #667eea;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }

        .file-drop-zone {
            border: 3px dashed #667eea;
            padding: 40px 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            text-align: center;
        }

        .file-drop-zone:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }

        .file-drop-zone.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }

        .drop-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .drop-text {
            font-size: 14px;
            color: #667eea;
            font-weight: 600;
        }

        input[type="file"] {
            display: none;
        }

        .file-list {
            max-height: 400px;
            overflow-y: auto;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            background: #fafafa;
        }

        .file-item {
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-item:last-child {
            border-bottom: none;
        }

        .file-item:hover {
            background: #f0f2ff;
        }

        .file-item.selected {
            background: #e8ebff;
            border-left: 4px solid #667eea;
            padding-left: 11px;
        }

        .file-item-radio {
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .file-item.selected .file-item-radio {
            border-color: #667eea;
            background: #667eea;
        }

        .file-item.selected .file-item-radio::after {
            content: '✓';
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .file-item-content {
            flex-grow: 1;
        }

        .file-item-name {
            font-size: 13px;
            color: #333;
            font-weight: 600;
            word-break: break-word;
        }

        .file-item-path {
            font-size: 11px;
            color: #999;
            margin-top: 3px;
        }

        .hidden {
            display: none !important;
        }

        .button-group {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 14px 40px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            flex: 1;
            min-width: 200px;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            min-width: 150px;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .status.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .status.info {
            background: #e3f2fd;
            color: #1565c0;
            border-left: 4px solid #2196f3;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea, #764ba2);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .info-box {
            margin-top: 30px;
            padding: 15px;
            background: #fffbe6;
            border-left: 4px solid #fbc02d;
            border-radius: 8px;
            font-size: 12px;
            color: #f57f17;
            line-height: 1.6;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            .title {
                font-size: 28px;
            }

            button {
                padding: 12px 24px;
                font-size: 13px;
            }

            .btn-primary {
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🎮 Wii Boot DOL</h1>
        <p class="subtitle">Convert ZIP to boot.dol</p>

        <!-- Step 1: Upload ZIP -->
        <div class="step">
            <div class="step-title">Step 1: Upload ZIP File</div>
            <div class="file-drop-zone" id="dropZone">
                <div class="drop-icon">📦</div>
                <div class="drop-text">Drop ZIP file here or click to select</div>
                <input type="file" id="zipFile" accept=".zip" />
            </div>
            <div id="uploadStatus" class="status hidden"></div>
        </div>

        <!-- Step 2: Select DOL File -->
        <div class="step hidden" id="selectStep">
            <div class="step-title">Step 2: Select DOL File</div>
            <div class="file-list" id="fileList"></div>
            <div id="selectStatus" class="status hidden"></div>
        </div>

        <!-- Step 3: Convert -->
        <div class="step hidden" id="convertStep">
            <div class="step-title">Step 3: Convert & Download</div>
            <div class="button-group">
                <button class="btn-primary" id="convertBtn">✓ Convert to boot.dol</button>
                <button class="btn-secondary" id="resetBtn">Reset</button>
            </div>
            <div id="convertStatus" class="status hidden"></div>
            <div id="progressContainer" class="hidden">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>

        <div class="info-box">
            ℹ️ Upload a ZIP file containing game files, select a DOL executable, and download the converted boot.dol for your Wii.
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <script>
        let selectedFile = null;
        let selectedDOLPath = null;
        let zipData = null;

        const dropZone = document.getElementById('dropZone');
        const zipInput = document.getElementById('zipFile');
        const selectStep = document.getElementById('selectStep');
        const convertStep = document.getElementById('convertStep');
        const fileList = document.getElementById('fileList');
        const uploadStatus = document.getElementById('uploadStatus');
        const selectStatus = document.getElementById('selectStatus');
        const convertStatus = document.getElementById('convertStatus');
        const convertBtn = document.getElementById('convertBtn');
        const resetBtn = document.getElementById('resetBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');

        // Drag and drop setup
        dropZone.addEventListener('click', () => zipInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files[0]) {
                handleZipFile(e.dataTransfer.files[0]);
            }
        });

        zipInput.addEventListener('change', (e) => {
            if (e.target.files[0]) {
                handleZipFile(e.target.files[0]);
            }
        });

        function handleZipFile(file) {
            if (!file.name.toLowerCase().endsWith('.zip')) {
                showStatus(uploadStatus, '❌ Please select a valid ZIP file', 'error');
                return;
            }

            selectedFile = file;
            selectedDOLPath = null;
            showStatus(uploadStatus, '🔍 Scanning ZIP file...', 'info');

            JSZip.loadAsync(file)
                .then((zip) => {
                    zipData = zip;
                    const dolFiles = [];

                    zip.forEach((path, file) => {
                        if (!file.dir) {
                            const ext = path.toLowerCase().split('.').pop();
                            if (ext === 'dol' || ext === 'elf' || ext === 'bin') {
                                dolFiles.push(path);
                            }
                        }
                    });

                    if (dolFiles.length === 0) {
                        showStatus(uploadStatus, '❌ No DOL/ELF files found in ZIP', 'error');
                        selectStep.classList.add('hidden');
                        convertStep.classList.add('hidden');
                        return;
                    }

                    // Show file list
                    fileList.innerHTML = '';
                    dolFiles.forEach((path, index) => {
                        const item = document.createElement('div');
                        item.className = 'file-item' + (index === 0 ? ' selected' : '');
                        if (index === 0) selectedDOLPath = path;

                        item.innerHTML = `
                            <div class="file-item-radio"></div>
                            <div class="file-item-content">
                                <div class="file-item-name">📄 ${path.split('/').pop()}</div>
                                <div class="file-item-path">${path}</div>
                            </div>
                        `;

                        item.addEventListener('click', () => {
                            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('selected'));
                            item.classList.add('selected');
                            selectedDOLPath = path;
                            showStatus(selectStatus, `✓ Selected: ${path}`, 'success');
                        });

                        fileList.appendChild(item);
                    });

                    selectStep.classList.remove('hidden');
                    convertStep.classList.remove('hidden');
                    showStatus(uploadStatus, `✓ ZIP loaded - Found ${dolFiles.length} file(s)`, 'success');
                    showStatus(selectStatus, `✓ Selected: ${dolFiles[0]}`, 'success');
                })
                .catch((err) => {
                    showStatus(uploadStatus, `❌ Error: ${err.message}`, 'error');
                });
        }

        function showStatus(element, message, type) {
            element.innerHTML = message;
            element.className = 'status ' + type;
            element.classList.remove('hidden');
        }

        convertBtn.addEventListener('click', convertToDOL);
        resetBtn.addEventListener('click', reset);

        function convertToDOL() {
            if (!selectedDOLPath || !zipData) {
                showStatus(convertStatus, '❌ No file selected', 'error');
                return;
            }

            convertBtn.disabled = true;
            progressContainer.classList.remove('hidden');
            progressFill.style.width = '0%';
            showStatus(convertStatus, 'Converting...', 'info');

            zipData.file(selectedDOLPath)
                .async('arraybuffer')
                .then((dolData) => {
                    progressFill.style.width = '50%';

                    const buffer = new ArrayBuffer(dolData.byteLength);
                    const view = new DataView(buffer);
                    const sourceView = new DataView(dolData);

                    for (let i = 0; i < dolData.byteLength; i++) {
                        view.setUint8(i, sourceView.getUint8(i));
                    }

                    if (view.getUint32(0xE0, false) === 0) {
                        view.setUint32(0xE0, 0x80003100, false);
                    }

                    progressFill.style.width = '100%';
                    return buffer;
                })
                .then((buffer) => {
                    setTimeout(() => {
                        const blob = new Blob([buffer], { type: 'application/octet-stream' });
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = 'boot.dol';
                        a.click();
                        URL.revokeObjectURL(url);

                        showStatus(convertStatus, '✓ Downloaded successfully!', 'success');
                        convertBtn.disabled = false;
                        progressContainer.classList.add('hidden');
                    }, 300);
                })
                .catch((err) => {
                    showStatus(convertStatus, `❌ Error: ${err.message}`, 'error');
                    convertBtn.disabled = false;
                    progressContainer.classList.add('hidden');
                });
        }

        function reset() {
            selectedFile = null;
            selectedDOLPath = null;
            zipData = null;
            zipInput.value = '';
            selectStep.classList.add('hidden');
            convertStep.classList.add('hidden');
            uploadStatus.classList.add('hidden');
            selectStatus.classList.add('hidden');
            convertStatus.classList.add('hidden');
            progressContainer.classList.add('hidden');
            progressFill.style.width = '0%';
            convertBtn.disabled = false;
        }
    </script>
</body>
</html>
